name: Build and publish Python package

on:
    workflow_dispatch:
    push:
        tags:
            - v[0-9]+.[0-9]+.[0-9]+

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          architecture: 'x64'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel twine build
          python -m build
      - name: Create pypirc file
        run: |
          echo "[distutils]" > ~/.pypirc
          echo "index-servers = gitea" >> ~/.pypirc
          echo "" >> ~/.pypirc
          echo "[gitea]" >> ~/.pypirc
          echo "repository: https://gitea.elektrik.link/api/packages/${{ github.repository_owner }}/pypi" >> ~/.pypirc
          echo "username: ${{ secrets.USERNAME }}" >> ~/.pypirc
          echo "password: ${{ secrets.PAT }}" >> ~/.pypirc
      - name: Publish to Gitea
        run: |
          python -m twine upload --repository gitea dist/*
